<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYKOR ERP - Proje Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Tam olarak image_2935e4.png'deki lacivert bar tasarımı */
        .aykor-navbar {
            background-color: #2c5d88; /* Orijinal görseldeki lacivert tonu */
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            min-height: 40px;
        }
        .nav-items a {
            color: white;
            text-decoration: none;
            margin-right: 18px;
            transition: 0.3s;
        }
        .nav-items a:hover { color: #b8d4f0; }
        .company-name { font-weight: 500; letter-spacing: 0.5px; }

        .main-container { padding: 25px; }
        .data-card { background: white; border-radius: 4px; border: 1px solid #dee2e6; padding: 0; overflow: hidden; }
        .table thead { background-color: #343a40; color: white; }
    </style>
</head>
<body>

    <div class="aykor-navbar">
        <div class="nav-items">
            <a href="/">Project</a>
            <a href="#">Budget Work</a>
            <a href="#">Future Project</a>
            <a href="#">Contracts</a>
            <a href="#">Firma</a>
            <a href="#">Supplier</a>
            <a href="#">Reports</a>
            <a href="#">Compose Reports</a>
        </div>
        <div class="company-name">
            AYKOR DENİZCİLİK MÜHENDİSLİK İNŞAAT SANAYİ VE TİCARET A.Ş
        </div>
    </div>

    <div class="main-container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 style="color: #333;">Proje Takip Paneli</h4>
            <button class="btn btn-primary btn-sm" onclick="loadProjects()">Listeyi Yenile (F5)</button>
        </div>

        <div class="data-card">
            <table class="table table-striped table-hover m-0">
                <thead>
                    <tr>
                        <th style="width: 15%">Proje Kodu</th>
                        <th style="width: 20%">Müşteri</th>
                        <th style="width: 50%">Konu</th>
                        <th style="width: 15%">Durum</th>
                    </tr>
                </thead>
                <tbody id="projectTableBody">
                    <tr><td colspan="4" class="text-center py-4">Veriler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();
                const tbody = document.getElementById('projectTableBody');
                tbody.innerHTML = ''; 

                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-danger text-center">Bağlantı Hatası: ${data.error}</td></tr>`;
                    return;
                }

                data.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${p.project_code || '-'}</strong></td>
                            <td>${p.customer || '-'}</td>
                            <td>${p.subject || '-'}</td>
                            <td><span class="badge bg-warning text-dark">${p.prostatus || '10'}</span></td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Fetch Hatası:", err);
            }
        }
        window.onload = loadProjects;
    </script>
</body>
</html>
