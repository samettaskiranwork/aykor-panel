<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYKOR ERP - Yönetim Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --aykor-blue: #1a4a72; --aykor-hover: #245d8d; }
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        /* Navigasyon İyileştirmeleri */
        .aykor-navbar { background-color: var(--aykor-blue); min-height: 48px; color: white; display: flex; align-items: center; padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); user-select: none; }
        .nav-link-custom { color: white !important; text-decoration: none; padding: 12px 15px; font-size: 13px; cursor: pointer; display: inline-block; transition: 0.2s; user-select: none; }
        .nav-link-custom:hover { background-color: var(--aykor-hover); }
        .dropdown-item { cursor: pointer; user-select: none; }
        .home-icon { font-size: 1.1rem; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .section { display: none; padding: 25px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-erp { background: white; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid #dee2e6; transition: 0.3s; }
        .table-erp { font-size: 11px; }
        .edit-link { text-decoration: none; color: #0d6efd; font-weight: bold; cursor: pointer; }
        .edit-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="aykor-navbar">
        <a class="nav-link-custom home-icon" onclick="navigate('home')"><i class="bi bi-house-door-fill"></i></a>
        
        <div class="dropdown d-inline-block">
            <a class="nav-link-custom dropdown-toggle" data-bs-toggle="dropdown">Project</a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" onclick="navigate('list')">Project List</a></li>
                <li><a class="dropdown-item" onclick="navigate('add')">Add Project</a></li>
            </ul>
        </div>
        <a class="nav-link-custom" onclick="navigate('reports')">Reports</a>
        <div class="ms-auto small opacity-75">AYKOR DENİZCİLİK MÜHENDİSLİK A.Ş</div>
    </div>

    <div id="section-home" class="section active">
        </div>

    <div id="section-list" class="section">
        <div class="card-erp p-3"><h6 class="fw-bold mb-3">Project List</h6><table class="table table-sm table-striped table-erp"><thead class="table-dark" id="th-p"></thead><tbody id="projectTableBody"></tbody></table></div>
    </div>

    <div id="section-add" class="section">
        <div class="card-erp p-4">
            <h5 class="fw-bold mb-4">Add Project</h5>
            <form id="genericForm" class="row">
                <input type="hidden" id="formType" value="project">
                <div class="col-md-6 border-end">
                    <div class="mb-3"><label class="form-label fw-bold">Project No</label><input type="text" class="form-control" name="project_code" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Customer Group</label><select id="groupSelect" class="form-select" name="customer_groups" required><option value="">Yükleniyor...</option></select></div>
                    <div class="mb-3"><label class="form-label fw-bold">Customer</label><select id="customerSelect" class="form-select" name="customer" required><option value="">Yükleniyor...</option></select></div>
                </div>
                <div class="col-md-6 ps-4">
                    <div class="mb-3"><label class="form-label fw-bold">Priority</label><input type="number" class="form-control" name="priority" value="5"></div>
                    <div class="mb-3"><label class="form-label fw-bold">PE</label><select id="engineerSelect" class="form-select" name="proengineer" required><option value="">Yükleniyor...</option></select></div>
                </div>
                <div class="col-12 text-end mt-4 pt-3"><button type="submit" class="btn btn-primary">Save</button></div>
            </form>
        </div>
    </div>

    <script>
        // --- KRİTİK DÜZELTME: Dropdownları dolduran ana fonksiyon ---
        async function loadProjectFormData() {
            try {
                const [gRes, cRes, eRes] = await Promise.all([
                    fetch('/api/firms/groups'), 
                    fetch('/api/firms/all-customers'),
                    fetch('/api/projects/get-dropdowns')
                ]);
                
                const groups = await gRes.json();
                const customers = await cRes.json();
                const dropdowns = await eRes.json();

                // Dropdownları doldur
                document.getElementById('groupSelect').innerHTML = '<option value="">Grup Seç...</option>' + groups.map(g => `<option value="${g.group_name}">${g.group_name}</option>`).join('');
                document.getElementById('customerSelect').innerHTML = '<option value="">Müşteri Seç...</option>' + customers.map(c => `<option value="${c.customer_name}">${c.customer_name}</option>`).join('');
                document.getElementById('engineerSelect').innerHTML = '<option value="">Sorumlu Seç...</option>' + dropdowns.engineers.map(e => `<option value="${e}">${e}</option>`).join('');
            } catch(e) { console.error("Dropdown hatası:", e); }
        }

        function navigate(path) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + path).classList.add('active');
            if(path === 'add') loadProjectFormData(); // Sayfa açılınca verileri çek
        }

        // ... Diğer JS fonksiyonlarını (loadTableData vb.) buraya ekle ...
    </script>
</body>
</html>
