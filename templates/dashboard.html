<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AYKOR ERP - Proje Yönetimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .aykor-header { background-color: #1a4a72; color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        .sub-nav { background: white; border-bottom: 1px solid #ddd; padding: 10px 25px; display: flex; gap: 20px; }
        .sub-nav button { border: none; background: none; font-weight: 600; color: #777; padding: 8px 15px; cursor: pointer; }
        .sub-nav button.active { color: #1a4a72; border-bottom: 3px solid #1a4a72; }
        .section { display: none; padding: 25px; }
        .section.active { display: block; }
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="aykor-header">
        <div style="font-weight: bold;">AYKOR ERP</div>
        <div style="font-size: 12px;">DENİZCİLİK MÜHENDİSLİK A.Ş</div>
    </div>

    <div class="sub-nav">
        <button id="tab-list" class="active" onclick="switchTab('list')">📁 Project List</button>
        <button id="tab-add" onclick="switchTab('add')">➕ Add Project</button>
    </div>

    <div id="section-list" class="section active">
        <div class="card p-4">
            <h5 class="text-secondary mb-4">Mevcut Projeler</h5>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Kod</th>
                        <th>Müşteri</th>
                        <th>Konu</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="projectTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="section-add" class="section">
        <div class="card p-4">
            <h5 class="text-secondary mb-4">Yeni Proje Detayları</h5>
            <form id="projectForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Project Code</label>
                    <input type="text" class="form-control" name="project_code" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Priority</label>
                    <select class="form-select" name="priority">
                        <option value="1">Low (1)</option>
                        <option value="2" selected>Medium (2)</option>
                        <option value="3">High (3)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Customer</label>
                    <input type="text" class="form-control" name="customer" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Customer Group</label>
                    <input type="text" class="form-control" name="customer_group">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" name="subject" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Item Quantity</label>
                    <input type="number" class="form-control" name="item_quantity" value="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Deadline</label>
                    <input type="date" class="form-control" name="deadline">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Deadline Time</label>
                    <input type="time" class="form-control" name="deadline_time">
                </div>
                <div class="col-md-5">
                    <label class="form-label">Project Engineer</label>
                    <input type="text" class="form-control" name="proengineer">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Project Status</label>
                    <input type="text" class="form-control" name="prostatus" value="Aktif">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Announcement Date</label>
                    <input type="date" class="form-control" name="annodate">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tender Reference</label>
                    <input type="text" class="form-control" name="tender_reference">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Bidbond Amount</label>
                    <input type="number" step="0.01" class="form-control" name="bid_bond" placeholder="0.00">
                </div>
                <div class="col-12 mt-4 border-top pt-3">
                    <button type="submit" class="btn btn-primary px-5">Veritabanına Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if(tab === 'list') loadProjects();
        }

        async function loadProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const tbody = document.getElementById('projectTableBody');
            tbody.innerHTML = '';
            data.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.project_code}</td><td>${p.customer}</td><td>${p.subject}</td><td><span class="badge bg-info text-dark">${p.prostatus || 'Aktif'}</span></td></tr>`;
            });
        }

        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Sayısal alanları dönüştür
            data.priority = parseInt(data.priority);
            data.item_quantity = parseInt(data.item_quantity);
            data.bid_bond = parseFloat(data.bid_bond) || 0.0;

            const res = await fetch('/api/add-project', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                alert("Proje Başarıyla Eklendi!");
                e.target.reset();
                switchTab('list');
            } else {
                const err = await res.json();
                alert("Hata: " + err.message);
            }
        };

        window.onload = loadProjects;
    </script>
</body>
</html>
