<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AYKOR ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .aykor-navbar { background-color: #1a4a72; min-height: 48px; color: white; display: flex; align-items: center; padding: 0 20px; }
        .nav-link-custom { color: white !important; text-decoration: none; padding: 10px 15px; font-size: 14px; cursor: pointer; }
        .section { display: none; padding: 30px; }
        .section.active { display: block; }
        .form-label { font-weight: 600; color: #444; }
    </style>
</head>
<body>

    <div class="aykor-navbar">
        <div class="dropdown">
            <a class="nav-link-custom dropdown-toggle" href="#" data-bs-toggle="dropdown">Project</a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="javascript:void(0)" onclick="navigate('list')">📁 Project List</a></li>
                <li><a class="dropdown-item" href="javascript:void(0)" onclick="navigate('add')">➕ Add Project</a></li>
            </ul>
        </div>
        <div class="ms-auto" style="font-size: 12px;">AYKOR DENİZCİLİK MÜHENDİSLİK A.Ş</div>
    </div>

    <div id="section-list" class="section active">
        <div class="card p-3 shadow-sm border-0">
            <h5>📋 Proje Takip Listesi</h5>
            <table class="table table-sm mt-3"><thead class="table-dark"><tr><th>Kod</th><th>Öncelik</th><th>Müşteri</th><th>Konu</th><th>Status</th></tr></thead><tbody id="projectTableBody"></tbody></table>
        </div>
    </div>

    <div id="section-add" class="section">
        <div class="card p-4 shadow-sm border-0">
            <h5 class="mb-4 text-primary">➕ Yeni Proje Kaydı</h5>
            <form id="projectForm" class="row">
                <div class="col-md-6 border-end pe-4">
                    <div class="mb-3"><label class="form-label">Project Code</label><input type="text" class="form-control" name="project_code" maxlength="15" required></div>
                    <div class="mb-3"><label class="form-label">Konu</label><input type="text" class="form-control" name="subject" maxlength="70" required></div>
                    <div class="mb-3"><label class="form-label">Customer Group</label>
                        <select class="form-select" name="customer_group">
                            <option value="22- Railway">22- Railway</option>
                            <option value="03- T.Navy">03- T.Navy</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">Müşteri</label>
                        <select class="form-select" name="customer">
                            <option value="Kalyon">Kalyon</option>
                            <option value="Aselsan">Aselsan</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">Miktar</label><input type="number" class="form-control" name="item_quantity" value="1"></div>
                </div>
                <div class="col-md-6 ps-4">
                    <div class="mb-3"><label class="form-label">Öncelik (1-10)</label><input type="number" class="form-control" name="priority" min="1" max="10" value="5"></div>
                    <div class="mb-3"><label class="form-label">Tender Reference</label><input type="text" class="form-control" name="tender_reference" maxlength="50"></div>
                    <div class="mb-3"><label class="form-label">Anno Dt</label><input type="date" class="form-control" name="annodate"></div>
                    <div class="mb-3"><label class="form-label">Deadline</label><input type="date" class="form-control" name="deadline"></div>
                    <div class="mb-3"><label class="form-label">Status</label>
                        <select class="form-select" name="prostatus">
                            <option value="10">10 - Hazırlık</option>
                            <option value="20">20 - Teklif Verildi</option>
                        </select>
                    </div>
                </div>
                <div class="col-12 text-end mt-4 pt-3 border-top"><button type="submit" class="btn btn-primary px-5">Sisteme Kaydet</button></div>
            </form>
        </div>
    </div>

    <script>
        function navigate(path) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + path).classList.add('active');
            history.pushState(null, "", "/" + path); // Linki değiştirir
            if(path === 'list') loadProjects();
        }

        async function loadProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const tbody = document.getElementById('projectTableBody');
            tbody.innerHTML = '';
            data.forEach(p => {
                tbody.innerHTML += `<tr><td><b>${p.project_code}</b></td><td>${p.priority}</td><td>${p.customer}</td><td>${p.subject}</td><td><span class="badge bg-primary">${p.prostatus}</span></td></tr>`;
            });
        }

        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/add-project', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
            });
            if(res.ok) { alert("Kaydedildi!"); navigate('list'); }
        };

        window.onload = () => {
            const path = window.location.pathname.substring(1) || 'list';
            navigate(path);
        };
    </script>
</body>
</html>
