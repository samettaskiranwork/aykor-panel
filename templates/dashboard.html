<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Aykor ERP - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .main-content { padding: 20px; }
        .table-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Proje Takip Paneli</h2>
                <button class="btn btn-primary" onclick="loadProjects()">Listeyi Yenile</button>
            </div>

            <div class="table-container">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Proje Kodu</th>
                            <th>Müşteri</th>
                            <th>Konu</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody id="projectTableBody">
                        <tr>
                            <td colspan="4" class="text-center">Veriler yükleniyor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadProjects() {
            try {
                // FastAPI'deki /api/projects rotasına istek atıyoruz
                const response = await fetch('/api/projects');
                const data = await response.json();
                
                const tableBody = document.getElementById('projectTableBody');
                tableBody.innerHTML = ''; // "Yükleniyor" yazısını temizle
                
                if (data.error) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="text-danger">Hata: ${data.error}</td></tr>`;
                    return;
                }

                data.forEach(project => {
                    const row = `
                        <tr>
                            <td><strong>${project.project_code || '-'}</strong></td>
                            <td>${project.customer || '-'}</td>
                            <td>${project.subject || '-'}</td>
                            <td>
                                <span class="badge ${project.prostatus === 'Tamamlandı' ? 'bg-success' : 'bg-warning text-dark'}">
                                    ${project.prostatus || 'Belirsiz'}
                                </span>
                            </td>
                        </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (err) {
                console.error("Veri çekme hatası:", err);
            }
        }

        // Sayfa ilk açıldığında verileri otomatik yükle
        window.onload = loadProjects;
    </script>

</body>
</html>
