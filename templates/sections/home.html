<div id="section-home" class="section active">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card-erp p-3 border-start border-danger border-5">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary small fw-bold text-uppercase">[Working Projects]</h6>
                        <h2 class="display-5 fw-bold mb-0" id="stat-working">-</h2>
                    </div>
                    <i class="bi bi-gear-fill text-danger opacity-25" style="font-size: 3rem;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-erp p-3 border-start border-info border-5">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary small fw-bold text-uppercase">[Budget Works]</h6>
                        <h2 class="display-5 fw-bold mb-0" id="stat-budget">-</h2>
                    </div>
                    <i class="bi bi-currency-dollar text-info opacity-25" style="font-size: 3rem;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-erp p-3 border-teal border-5">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary small fw-bold text-uppercase">[Future Projects]</h6>
                        <h2 class="display-5 fw-bold mb-0" id="stat-future">-</h2>
                    </div>
                    <i class="bi bi-rocket-takeoff text-success opacity-25" style="font-size: 3rem;"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="card-erp p-3 mb-4 bg-dark text-white shadow-sm">
        <div class="row text-center align-items-center">
            <div class="col border-end border-secondary"><div class="small opacity-75">NEW YORK</div><div class="fw-bold" id="clock-ny">00:00:00</div></div>
            <div class="col border-end border-secondary"><div class="small opacity-75">KIEL</div><div class="fw-bold" id="clock-de">00:00:00</div></div>
            <div class="col border-end border-secondary text-warning"><div class="small fw-bold">ISTANBUL</div><div class="fw-bold h5" id="clock-tr">00:00:00</div></div>
            <div class="col border-end border-secondary"><div class="small opacity-75">SEOUL</div><div class="fw-bold" id="clock-kr">00:00:00</div></div>
            <div class="col"><div class="small opacity-75">SINGAPORE</div><div class="fw-bold" id="clock-sg">00:00:00</div></div>
        </div>
    </div>

    <div class="card-erp p-3 border-top border-warning border-5 shadow-sm">
        <h6 class="fw-bold mb-3 text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i> Kritik Projeler</h6>
        <div class="table-responsive">
            <table class="table table-sm table-hover table-bordered table-striped table-erp mb-0">
 <thead class="table-light">
    <tr>
        <th>Kod</th>             <th>Müşteri</th>         <th>İhale Ref.</th>      <th>Konu</th>            <th>Adet</th>            <th>Deadline</th>        <th>Saat</th>            <th>Sorumlu (PE)</th>    <th>İlan Tarihi</th>     <th class="text-center">Statü</th> </tr>
</thead>
<tbody id="homeUpcomingTableBody">
    <tr><td colspan="11" class="text-center py-4 text-muted">Kritik işler taranıyor...</td></tr>
</tbody>
</table>
        </div>
    </div>
</div>

<script>
async function initHomeModule() {
    console.log("Home modülü başlatılıyor..."); // F12 konsolunda bunu görmelisin
    try {
        const response = await fetch('/api/home/dashboard_data');
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.json();
        const tbody = document.getElementById('homeUpcomingTableBody');

        // 1. İstatistikler
        document.getElementById('stat-working').innerText = data.stats.working || 0;
        document.getElementById('stat-budget').innerText = data.stats.budget || 0;
        document.getElementById('stat-future').innerText = data.stats.future || 0;

        // 2. Tablo
        if (data.upcoming_projects.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Kriterlere uygun kritik iş bulunamadı.</td></tr>';
        } else {
            tbody.innerHTML = data.upcoming_projects.map(p => {
                const diff = Math.ceil((new Date(p.deadline) - new Date()) / (1000 * 60 * 60 * 24));
                return `
                    <tr>
            <td><strong>${p.project_code}</strong></td>          <td>${p.customer}</td>                               <td>${p.subject}</td>                                <td>${p.tender_reference || '-'}</td>                <td>${p.item_quantity || 0}</td>                     <td>${p.deadline}</td>                               <td>${p.deadline_time || '-'}</td>                   <td>
                <span class="badge ${diff <= 3 ? 'bg-danger' : 'bg-warning text-dark'}">
                    ${diff} Gün
                </span>
            </td>                                                <td>${p.proengineer || '-'}</td>                     <td>${p.annodate || '-'}</td>                        <td class="text-center">
                <small class="badge bg-light text-dark border">${p.prostatus}</small>
            </td>                                                </tr>`;
}).join('');
        }
    } catch (err) {
        console.error("Home Modülü Hatası:", err);
        document.getElementById('homeUpcomingTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Veri yüklenemedi!</td></tr>';
    }
}

// Saatler (Bağımsız çalışır)
function runHomeClocks() {
    const opt = { hour:'2-digit', minute:'2-digit', hour12:false };
    const clocks = {'clock-tr':'Europe/Istanbul','clock-ny':'America/New_York','clock-de':'Europe/Berlin','clock-kr':'Asia/Seoul','clock-sg':'Asia/Singapore'};
    for (const [id, tz] of Object.entries(clocks)) {
        const el = document.getElementById(id);
        if(el) el.innerText = new Date().toLocaleTimeString('tr-TR', { ...opt, timeZone: tz });
    }
}
setInterval(runHomeClocks, 30000);
runHomeClocks();

// TEST İÇİN: Sayfa yüklendiğinde otomatik çalıştır
// Normalde dashboard.html içindeki navigate('home') bunu tetiklemeli.
initHomeModule(); 
</script>
