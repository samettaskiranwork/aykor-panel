<div id="section-edit" class="section">
    <div class="card-erp p-4 border-primary shadow">
        <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-pencil-square"></i> Kayıt Detayı ve Güncelleme</h5>
        <form id="editForm" class="row">
            <input type="hidden" id="editId">
            <input type="hidden" id="editType">
            
            <div class="col-md-6 border-end">
                <div class="mb-3">
                    <label class="form-label fw-bold">Project Code</label>
                    <input type="text" class="form-control" name="project_code" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Konu (Subject)</label>
                    <input type="text" class="form-control" name="subject" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Müşteri (Customer)</label>
                    <input type="text" class="form-control" name="customer" required>
                </div>
            </div>
            
            <div class="col-md-6 ps-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Miktar (Qty)</label>
                    <input type="number" class="form-control" name="item_quantity">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Öncelik (Priority)</label>
                    <input type="number" class="form-control" name="priority">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Durum (Status)</label>
                    <input type="text" class="form-control" name="prostatus">
                </div>
            </div>
            
            <div class="col-12 text-end mt-4 border-top pt-3">
                <button type="button" class="btn btn-secondary me-2" onclick="navigate('home')">İptal</button>
                <button type="submit" class="btn btn-success px-5">Verileri Güncelle</button>
            </div>
        </form>
    </div>
</div>
