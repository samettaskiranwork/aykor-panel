<div id="section-list" class="section">
    <div class="card-erp p-3">
        <h6 class="fw-bold mb-3">Project List</h6>
        <div class="table-responsive">
            <table class="table table-sm table-striped table-erp">
                <thead class="table-dark">
                    <tr>
                        <th>Project Code</th>
                        <th>Priority</th>
                        <th>Customer</th>
                        <th>Subject</th>
                        <th>Qty</th>
                        <th>Deadline</th>
                        <th>Engineer</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="projectTableBody">
                    <tr><td colspan="9" class="text-center py-3 text-muted">Projeler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function initProjectListModule() {
    console.log("Modül Tetiklendi: Project List");
    try {
        const res = await fetch('/api/project-list/');
        const data = await res.json();
        const tbody = document.getElementById('projectTableBody');

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center py-3">Kayıtlı proje bulunamadı.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(p => `
            <tr>
                <td><strong>${p.project_code}</strong></td>
                <td><span class="badge bg-light text-dark border">${p.priority || '-'}</span></td>
                <td>${p.customer}</td>
                <td>${p.subject}</td>
                <td>${p.item_quantity}</td>
                <td>${p.deadline || '-'}</td>
                <td>${p.proengineer}</td>
                <td><span class="badge bg-primary">${p.prostatus || 'Active'}</span></td>
                <td class="text-center">
                    <a class="edit-link" onclick="openEditPage('project', ${p.id})"><i class="bi bi-pencil-square"></i></a>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        console.error("Liste yükleme hatası:", err);
    }
}
</script>
