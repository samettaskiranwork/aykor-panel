<div id="section-add" class="section">
    <div class="card-erp p-4">
        <h5 class="fw-bold mb-4">Add Project</h5>
        <form id="projectAddForm" class="row">
            <div class="col-md-6 border-end">
                <div class="mb-3">
                    <label class="form-label fw-bold">Project No</label>
                    <input type="text" class="form-control" name="project_code" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Subject</label>
                    <input type="text" class="form-control" name="subject" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Customer Group</label>
                    <select id="groupSelect" class="form-select" name="customer_groups" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Customer</label>
                    <select id="customerSelect" class="form-select" name="customer" required></select>
                </div>
            </div>
            <div class="col-md-6 ps-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Qty / Priority</label>
                    <div class="d-flex gap-2">
                        <input type="number" class="form-control" name="item_quantity" placeholder="Qty">
                        <input type="number" class="form-control" name="priority" min="1" max="10" placeholder="Priority">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Deadline</label>
                    <input type="date" class="form-control" name="deadline">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Engineer</label>
                    <select id="engineerSelect" class="form-select" name="proengineer" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Type</label>
                    <select class="form-select" name="project_type">
                        <option value="System">System</option>
                        <option value="Spare Part">Spare Part</option>
                    </select>
                </div>
            </div>
            <div class="col-12 text-end mt-4 border-top pt-3">
                <button type="submit" class="btn btn-primary px-5">Save Project</button>
            </div>
        </form>
    </div>
</div>

<script>
async function initAddProjectModule() {
    console.log("Modül Tetiklendi: Add Project Form");
    try {
        const res = await fetch('/api/add-project/dropdowns');
        const d = await res.json();
        
        document.getElementById('groupSelect').innerHTML = d.groups.map(g => `<option value="${g}">${g}</option>`).join('');
        document.getElementById('customerSelect').innerHTML = d.customers.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('engineerSelect').innerHTML = d.engineers.map(e => `<option value="${e}">${e}</option>`).join('');
    } catch (err) { console.error("Dropdown hatası:", err); }
}

document.getElementById('projectAddForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/api/add-project/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(formData)
    });
    if(res.ok) { 
        alert("Project Added Successfully!"); 
        navigate('list'); 
    }
});
</script>
