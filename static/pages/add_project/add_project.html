<div id="section-add" class="section">
    <div class="card-erp p-4 border-top border-primary shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold text-dark mb-0" id="add-project-title">Add Project</h5>
            <span class="badge bg-light text-muted border" id="edit-mode-badge" style="display: none;">Edit Mode</span>
        </div>

        <form id="projectAddForm" class="row">
            

            <div class="col-md-6 border-end">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Project No</label>
                    <input type="text" class="form-control form-control-sm" name="project_code" id="input_project_code"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Subject</label>
                    <input type="text" class="form-control form-control-sm" name="subject" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Customer Group</label>
                    <select id="groupSelect" class="form-select form-select-sm" name="customer_groups"
                        required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Customer</label>
                    <select id="customerSelect" class="form-select form-select-sm" name="customer" required></select>
                </div>
            </div>

            <div class="col-md-6 ps-4">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Qty / Priority</label>
                    <div class="d-flex gap-2">
                        <input type="number" class="form-control form-control-sm" name="item_quantity"
                            placeholder="Qty">
                        <input type="number" class="form-control form-control-sm" name="priority" min="1" max="10"
                            placeholder="Priority">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Deadline</label>
                    <input type="date" class="form-control form-control-sm" name="deadline">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Engineer</label>
                    <select id="engineerSelect" class="form-select form-select-sm" name="proengineer" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Type</label>
                    <select class="form-select form-select-sm" name="project_type">
                        <option value="System">System</option>
                        <option value="Spare Part">Spare Part</option>
                    </select>
                </div>
            </div>

            <div class="col-12 text-end mt-4 border-top pt-3">
                <button type="button" class="btn btn-light btn-sm me-2 border"
                    onclick="resetProjectForm()">Cancel</button>
                <button type="submit" id="projectSubmitBtn" class="btn btn-primary btn-sm px-5">Save Project</button>
            </div>
        </form>
    </div>
</div>
