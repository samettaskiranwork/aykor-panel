<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYKOR ERP - Güvenli Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --aykor-primary: #1a4a72; --aykor-secondary: #245d8d; }
        body { 
            background: linear-gradient(135deg, var(--aykor-primary) 0%, var(--aykor-secondary) 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            background: white; padding: 2.5rem; border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 420px; 
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); }
        .brand-logo { font-size: 3rem; color: var(--aykor-primary); margin-bottom: 1rem; }
        .btn-primary { background-color: var(--aykor-primary); border: none; padding: 12px; font-weight: 600; }
        .btn-primary:hover { background-color: var(--aykor-secondary); }
        .form-control { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .form-control:focus { border-color: var(--aykor-primary); box-shadow: 0 0 0 0.25rem rgba(26, 74, 114, 0.1); }
        .input-group-text { background: transparent; border-right: none; color: #666; }
        .form-control { border-left: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-logo">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h4 class="fw-bold text-dark">APY</h4>
            <p class="text-muted small">AYKOR PROJE YÖNETİMİ</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Kullanıcı Adı</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person text-primary"></i></span>
                    <input type="text" name="username" class="form-control shadow-sm" placeholder="Kullanıcı adınız" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Şifre</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key text-primary"></i></span>
                    <input type="password" name="password" class="form-control shadow-sm" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                    <label class="form-check-label small text-muted" for="remember_me">Beni Hatırla</label>
                </div>
                <a href="#" class="small text-decoration-none">Şifremi Unuttum?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sisteme Giriş Yap
            </button>
            
            <div class="text-center">
                <small class="text-muted">© 2026 Aykor Denizcilik A.Ş.</small>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Form verilerini yakala
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Checkbox durumunu manuel ekleyelim (işaretli değilse gelmez)
            data.remember_me = document.getElementById('remember_me').checked;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    // Giriş başarılıysa home sayfasına uçur
                    window.location.href = '/home';
                } else {
                    const error = await res.json();
                    alert("Giriş başarısız: " + (error.detail || "Kullanıcı adı veya şifre hatalı"));
                }
            } catch (err) {
                alert("Sunucuyla bağlantı kurulamadı!");
            }
        };
    </script>
</body>
</html>
